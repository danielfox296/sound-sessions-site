name: Deploy sound sessions site

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install jinja2 markdown Pillow pyyaml

      - name: Build site
        run: python3 build.py

      - name: Stage site
        run: |
          mkdir -p _site
          cp -r *.html styles.css _site/ 2>/dev/null || true
          cp -r sitemap.xml rss.xml llms.txt _site/ 2>/dev/null || true
          cp -r img _site/img 2>/dev/null || true
          cp -r audio _site/audio 2>/dev/null || true
          cp -r js _site/js 2>/dev/null || true
          cp -r sessions _site/sessions 2>/dev/null || true
          cp -r blog _site/blog 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
