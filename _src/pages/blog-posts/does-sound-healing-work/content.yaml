meta_description: "A Denver music producer on whether sound healing works: which claims are false, what the real science says, and why the hour can still be worth having."
llms_description: "First-person essay from the Firstwater facilitator, a music producer, on whether sound healing works. Rejects the cellular and cancer-cure claims as false, explains the real oncotripsy research they are a cartoon of (ultrasound near 500 kHz, about eleven octaves above a singing bowl), and argues the value is regulated attention and community, not the sound's chemistry. Covers the underwhelm case and how to tell honest facilitation from snake oil."
tags: [journal, sound]
sections:
  - type: prose
    body: |
      Does sound healing work? It depends entirely on what someone told you it
      does. If a facilitator promised that a bowl would repair your cells or
      dissolve a disease, no. That is not happening in a room with a bowl in it.
      If you came for an uninterrupted hour to sit with your own mind, near
      other people doing the same thing, then probably, and that has almost
      nothing to do with the chemistry of the sound.

      I make records for a living, and I have wanted to walk out of more than
      one sound bath. I also run my own. Both of those are true, and they sit
      together more easily than either the people selling this or the people
      mocking it tend to admit.

  - type: subhead
    text: "Is sound healing real, or is it pseudoscience?"

  - type: prose
    body: |
      A few years ago I was at a sound bath in Kelowna, British Columbia, on a
      Sunday morning. The practitioner told the room that the sound targeted
      diseased cells and either exploded them or rendered them inert. I got
      suspicious before she finished the sentence.

      That specific claim, that tones played across a room kill disease, has
      nothing under it. Tones are everywhere. You are soaking in them right now.
      A lot of evidence would be needed to show that ordinary sound does
      something medical to the body, and that evidence is not on the table.
      Extraordinary claims still require extraordinary evidence, and this
      corner of the wellness world hands out extraordinary claims for the price
      of a ticket.

  - type: pullquote
    text: "I'm not a skeptic, and I'm not a believer. I'm someone who can participate in this and get a tremendous amount out of it."
    accent: "teal"

  - type: subhead
    text: "Can sound actually kill cancer cells?"

  - type: prose
    body: |
      Here is the strange part. There is a real thing underneath the Kelowna
      claim, and it is more interesting than the claim.

      Researchers at Caltech published work on something they named oncotripsy:
      you can tune ultrasound to a frequency where cancer cells and healthy
      cells respond differently, and at that frequency the cancer cells come
      apart while the healthy ones are left intact. It is real, it is careful,
      and it is nowhere near a yoga studio. The experiments run in a dish, on
      cells in suspension, using ultrasound around 500,000 hertz.

      A singing bowl rings somewhere near 250 to 500 hertz. The ultrasound in
      those experiments sits near 500,000. That is roughly eleven octaves up.
      Eleven octaves is the whole distance between an experimental oncology
      technique and a person waving a mallet on a Sunday. When a facilitator
      borrows the headline and drops the eleven octaves, the room gets a
      costume instead of the science.

  - type: prose
    body: |
      This is the part that actually bothers me, and it is not the belief. It
      is the accuracy. People can get something real out of this hour, and the
      whole thing becomes a laughing stock the moment someone claims a bowl
      cured cancer. That claim alienates every reasonable person in earshot,
      and it takes the people who came in good faith down with it.

      Cancer recovery credited to breath, meditation, lifestyle, and a strong
      held belief over months? I can entertain that. Cancer recovery from
      tones? No. The difference matters, and blurring it is how the category
      earns its worst reputation.

  - type: subhead
    text: "So does a sound bath do anything?"

  - type: prose
    body: |
      I stayed on the mat in Kelowna. I wasn't there for apoptosis. I was there
      to relax, to work with my own attention, to spend an hour I would have
      otherwise wasted around good people, and to hear whatever the facilitator's
      instinct decided I should hear.

      That is the honest offer, and I think of it as an asymmetrical bet. You
      stake forty-five dollars and an hour. Compare that hour to the others in
      your week. Therapy is an hour. A pointless work call is an hour. Being on
      hold with the DMV is an hour. Every one of them is a chance to observe
      yourself and work with what you find, and every one of them is shredded by
      distraction, aggravation, and other people pushing their demands into your
      attention.

      A sound bath is an increasingly rare thing: a room curated on purpose, in
      sound and light and intention, that hands you uninterrupted time to settle
      your breath, put down some fear or judgment or old story, and practice
      being the person you would rather be, next to other people doing the same
      work. The alternative for that hour is usually scrolling a feed built to
      spike your cortisol as efficiently as possible. Set against that, the bet
      is not close.

  - type: subhead
    text: "What if I go and nothing happens?"

  - type: prose
    body: |
      Sometimes people leave underwhelmed and turn it on themselves. There's a
      real post out there from a first-timer: "I left the experience feeling
      something is wrong with me or my energy is stale." Nothing moved for her,
      and she assumed the fault was hers.

      It wasn't. If a friend tells you a drive in the country will clear your
      head, and you spend the whole drive stuck in traffic, that is not a
      character flaw. Sound, space, community, and rest are the elements here.
      We are responsible for working with them, and we hold them loosely,
      because they don't perform on command. Someone arriving with a racing,
      unpracticed mind may feel nothing at the end of an hour. That same person
      can come back on a different day, in a different season, and finally let
      go of tension their body has held for years.

      Each session is an opportunity, not a guarantee. To borrow a phrase from
      the Christian tradition, it works something like a means of grace. You set
      yourself up, through your own choices and attention, to grow. Church and
      prayer work the same way. The remarkable thing doesn't always arrive. And
      sometimes it does.

  - type: subhead
    text: "How do I tell honest facilitation from snake oil?"

  - type: prose
    body: |
      A facilitator's ideas and the truth are two separate things, and you are
      allowed to hold them separately. Somebody hitting a gong intuitively is
      not thereby handed the secrets of the universe. Some of them might have
      real wisdom. That is for you to weigh.

      My rule is sovereignty. Bring your own inner knowing and your own
      calibrated judgment, especially to any claim that sounds fantastical, and
      let the rest wash past. Not everything said in a sound bath needs to be
      put on trial. It isn't a court of law, and if you feel it has to be, there
      may be more freedom available in letting other people hold their own ideas
      beside your skepticism without it costing you the room. You can dismiss the
      claim and keep the hour. I do it all the time.

  - type: prose
    body: |
      So: does sound healing work? The cellular claims don't, and I'll say that
      as plainly as anyone with a lab coat. The hour does, for a lot of people,
      most of the time, for reasons that need no pseudoscience to explain. Come
      in expecting the second thing and you will rarely leave empty-handed.

      I stayed on the mat in Kelowna. I wasn't there for the cure. The hour was
      good.

